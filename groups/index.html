<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#7B1717">
    <title>Software Security – Group Assignment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preload" href="/commons/fonts/memSYaGs126MiZpBA-UvWbX2vVnXBbObj2OVZyOOSr4dVJWUgsjZ0B4gaVI.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/commons/style.css">
    <style>
        .chip.dragging { opacity: 0.3; }
        .drop-zone.drag-over {
            background-color: #E6E6F8;
            outline: 2px solid #17177B;
            outline-offset: -2px;
        }
        .card-hdr .edit-hint { opacity: 0; transition: opacity 0.15s; }
        .card-hdr:hover .edit-hint { opacity: 1; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- ══ EDIT WRAP — hidden in present mode ══════════════════════════════ -->
    <div id="editWrap">

        <nav class="mb-6">
            <a href="/" class="inline-flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-[#7B1717] transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
                All Tools
            </a>
        </nav>

        <header class="text-center mb-10">
            <img src="https://hannesmolsen.de/images/software-security_logo.png" alt="Software Security" class="mx-auto h-20 mb-4 rounded-lg" />
            <h1 class="text-4xl font-extrabold text-gray-900 mb-2">Group Assignment</h1>
            <p class="text-xl text-gray-500">Randomly assign training participants into groups</p>
        </header>

        <main class="max-w-6xl mx-auto space-y-6">

            <!-- Controls card -->
            <div class="bg-white p-6 md:p-8 rounded-xl shadow-2xl">
                <h2 class="text-2xl font-bold text-black mb-6 border-b pb-2">Setup</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                    <div class="md:col-span-2">
                        <label for="participantInput" class="block text-sm font-medium text-gray-700 mb-1">
                            Participants
                            <span class="text-gray-400 font-normal">(one name per line)</span>
                        </label>
                        <textarea id="participantInput" rows="8"
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-[#17177B] focus:border-[#17177B] transition shadow-sm resize-y font-mono text-sm bg-[#E7E6E6]"
                            placeholder="Alice&#10;Bob&#10;Charlie&#10;Dave&#10;Eve&#10;Frank&#10;Grace&#10;Heidi"></textarea>
                    </div>

                    <div class="flex flex-col gap-3">
                        <div>
                            <label for="groupCount" class="block text-sm font-medium text-gray-700 mb-1">Number of groups</label>
                            <input type="number" id="groupCount" min="1" max="99" value="3"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-[#17177B] focus:border-[#17177B] transition shadow-sm bg-[#E7E6E6] text-center text-3xl font-bold">
                        </div>
                        <button onclick="assignRandomly()"
                            class="w-full px-4 py-3 bg-[#7B1717] text-white font-semibold rounded-lg hover:bg-[#C05C5C] transition duration-150 shadow-md focus:outline-none focus:ring-2 focus:ring-[#7B1717] focus:ring-offset-2">
                            Assign Randomly
                        </button>
                        <button onclick="resetAssignments()"
                            class="w-full px-4 py-3 border-2 border-gray-300 text-gray-700 font-semibold rounded-lg hover:border-gray-400 hover:bg-gray-50 transition duration-150">
                            Reset Assignments
                        </button>
                        <button onclick="confirmResetAll()"
                            class="w-full px-4 py-3 border-2 border-[#7B1717] text-[#7B1717] font-semibold rounded-lg hover:bg-[#F8E6E6] transition duration-150">
                            Reset Everything
                        </button>
                    </div>
                </div>
            </div>

            <!-- Toast notification -->
            <div id="toast" class="fixed top-6 right-6 z-40 hidden px-5 py-3 rounded-lg shadow-xl border text-sm font-medium max-w-xs pointer-events-none"></div>

            <!-- Stats bar (contains present button) -->
            <div id="statsBar" class="hidden bg-white px-4 py-3 rounded-xl shadow border border-gray-200 flex items-center gap-4 flex-wrap">
                <div id="statsText" class="text-sm text-gray-600 flex flex-wrap items-center gap-x-5 gap-y-1 flex-grow min-w-0"></div>
                <div class="flex items-center gap-2 shrink-0">
                    <button onclick="window.location.href='?view=present'"
                        class="inline-flex items-center gap-2 px-4 py-2 bg-[#7B1717] text-white text-sm font-semibold rounded-lg hover:bg-[#C05C5C] transition duration-150 shadow">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />
                        </svg>
                        Present
                    </button>
                    <a href="?view=present" target="_blank"
                        class="p-2 text-gray-400 hover:text-[#7B1717] rounded-lg hover:bg-[#F8E6E6] transition-colors"
                        title="Open in new tab">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
                        </svg>
                    </a>
                </div>
            </div>

            <!-- Unassigned pool -->
            <div id="unassignedSection" class="hidden">
                <div id="unassignedPool"
                    class="drop-zone bg-white rounded-xl shadow-lg border-2 border-dashed border-gray-300 p-5 transition-colors duration-150">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Unassigned</p>
                    <div id="unassignedChips" class="flex flex-wrap gap-2 min-h-8"></div>
                </div>
            </div>

            <!-- Groups grid -->
            <div id="groupsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>

        </main>

        <footer class="mt-12 py-6 text-center text-sm text-gray-500">
            <p class="mb-2">&copy; 2026 Software Security</p>
            <ul class="flex justify-center gap-6 list-none p-0">
                <li><a href="https://hannesmolsen.de/impressum.html" class="hover:underline">Impressum</a></li>
                <li><a href="https://hannesmolsen.de/datenschutz.html" class="hover:underline">Datenschutz</a></li>
                <li><a href="https://hannesmolsen.de" class="hover:underline">Hannes Molsen</a></li>
            </ul>
        </footer>

    </div><!-- /editWrap -->

    <!-- ══ PRESENT WRAP — fixed overlay, shown via ?view=present ═══════════ -->
    <div id="presentWrap" style="display:none; position:fixed; inset:0; z-index:50; flex-direction:column; background:#E7E6E6; overflow:auto; padding:1.5rem; gap:1rem; font-family:'Open Sans',sans-serif;">

        <!-- Present header -->
        <div style="display:flex; align-items:center; justify-content:space-between; padding-bottom:1rem; border-bottom:1px solid rgba(0,0,0,0.1); flex-shrink:0;">
            <div style="display:flex; align-items:center; gap:1rem;">
                <img src="https://hannesmolsen.de/images/software-security_logo.png" alt="Software Security" style="height:2.5rem; border-radius:0.5rem;">
                <div>
                    <p style="color:#6B7280; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; margin:0;">Group Assignment</p>
                    <p id="presentSubtitle" style="color:#374151; font-size:0.85rem; margin:0;"></p>
                </div>
            </div>
            <a href="?"
                style="display:inline-flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; border:1px solid rgba(0,0,0,0.15); color:#374151; font-size:0.875rem; font-weight:500; border-radius:0.5rem; text-decoration:none; transition:background 0.15s;"
                onmouseover="this.style.background='rgba(0,0,0,0.05)'; this.style.color='#111827';"
                onmouseout="this.style.background='transparent'; this.style.color='#374151';">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 9l-6 6m0 0l6 6m-6-6h16" />
                </svg>
                Back to Setup
            </a>
        </div>

        <!-- Present grid (populated by renderPresent) -->
        <div id="presentGrid" style="flex:1; display:grid; gap:1rem; align-content:stretch;"></div>

    </div><!-- /presentWrap -->

    <script>
        // ── URL mode detection ─────────────────────────────────────────────────
        const PRESENT = new URLSearchParams(location.search).get('view') === 'present';

        // ── Word lists for random group names ──────────────────────────────────
        const ADJECTIVES = [
            'Flying', 'Cunning', 'Brave', 'Swift', 'Mighty', 'Fierce', 'Clever', 'Sneaky',
            'Bold', 'Daring', 'Fuzzy', 'Grumpy', 'Hungry', 'Speedy', 'Tiny', 'Ancient',
            'Mystic', 'Golden', 'Cosmic', 'Electric', 'Turbo', 'Disco', 'Neon', 'Radical',
            'Epic', 'Legendary', 'Invisible', 'Exploding', 'Bouncing', 'Spinning', 'Dancing',
            'Roaring', 'Howling', 'Charging', 'Glowing', 'Frozen', 'Flaming', 'Crystal',
            'Iron', 'Rubber', 'Sparkly', 'Magnificent', 'Thundering', 'Shadow', 'Silver',
            'Caffeinated', 'Philosophical', 'Unstoppable', 'Peculiar', 'Turbocharged',
        ];

        const ANIMALS = [
            'Fox', 'Beaver', 'Wolf', 'Bear', 'Eagle', 'Shark', 'Tiger', 'Panda', 'Penguin',
            'Koala', 'Platypus', 'Narwhal', 'Octopus', 'Flamingo', 'Gecko', 'Sloth',
            'Capybara', 'Axolotl', 'Wombat', 'Hedgehog', 'Raccoon', 'Otter', 'Mongoose',
            'Meerkat', 'Chameleon', 'Armadillo', 'Pangolin', 'Quokka', 'Tapir', 'Walrus',
            'Yak', 'Llama', 'Alpaca', 'Jaguar', 'Cheetah', 'Hyena', 'Wolverine', 'Badger',
            'Ferret', 'Ocelot', 'Bobcat', 'Lynx', 'Bison', 'Moose', 'Reindeer', 'Manatee',
            'Tardigrade', 'Dingo', 'Weasel', 'Salamander',
        ];

        function randomGroupName(exclude = []) {
            const excluded = new Set(exclude);
            let name, attempts = 0;
            do {
                const adj    = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
                const animal = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
                name = `${adj} ${animal}`;
                attempts++;
            } while (excluded.has(name) && attempts < 200);
            return name;
        }

        function generateGroupNames(count) {
            const names = [];
            for (let i = 0; i < count; i++) names.push(randomGroupName(names));
            return names;
        }

        // ── State ──────────────────────────────────────────────────────────────
        const STORAGE_KEY = 'ss-group-tool';

        let state = {
            participants: [],
            numGroups:    3,
            groups:       [],
            unassigned:   [],
            groupNames:   [],
        };

        let drag = null;

        // ── DOM references ─────────────────────────────────────────────────────
        const editWrap          = document.getElementById('editWrap');
        const presentWrap       = document.getElementById('presentWrap');
        const presentGrid       = document.getElementById('presentGrid');
        const presentSubtitle   = document.getElementById('presentSubtitle');
        const participantInput  = document.getElementById('participantInput');
        const groupCountInput   = document.getElementById('groupCount');
        const statsBar          = document.getElementById('statsBar');
        const statsText         = document.getElementById('statsText');
        const unassignedSection = document.getElementById('unassignedSection');
        const unassignedPool    = document.getElementById('unassignedPool');
        const unassignedChips   = document.getElementById('unassignedChips');
        const groupsGrid        = document.getElementById('groupsGrid');
        const toastEl           = document.getElementById('toast');

        // ── Persistence ────────────────────────────────────────────────────────
        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function load() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const parsed = JSON.parse(raw);
                if (!parsed || !Array.isArray(parsed.participants)) return;
                state = parsed;

                let migrated = false;
                if (!Array.isArray(state.groupNames)) {
                    state.groupNames = generateGroupNames(state.groups.length);
                    migrated = true;
                } else {
                    while (state.groupNames.length < state.groups.length) {
                        state.groupNames.push(randomGroupName(state.groupNames));
                        migrated = true;
                    }
                    state.groupNames = state.groupNames.slice(0, state.groups.length);
                }
                if (migrated) save();
            } catch (_) { /* ignore corrupt data */ }
        }

        // ── Toast ──────────────────────────────────────────────────────────────
        const TOAST_STYLES = {
            success: 'bg-[#E6F3E6] text-[#177B17] border-[#177B17]',
            error:   'bg-[#F8E6E6] text-[#7B1717] border-[#7B1717]',
            warning: 'bg-[#FFFDE6] text-[#DFDF17] border-[#DFDF17]',
            info:    'bg-[#E6E6F8] text-[#17177B] border-[#17177B]',
        };

        function showToast(msg, type = 'info') {
            toastEl.className = `fixed top-6 right-6 z-50 px-5 py-3 rounded-lg shadow-xl border text-sm font-medium max-w-xs pointer-events-none ${TOAST_STYLES[type]}`;
            toastEl.textContent = msg;
            clearTimeout(toastEl._t);
            toastEl._t = setTimeout(() => toastEl.classList.add('hidden'), 3500);
        }

        // ── Edit-mode render ───────────────────────────────────────────────────
        function render() {
            participantInput.value = state.participants.join('\n');
            groupCountInput.value  = state.numGroups;

            const total       = state.participants.length;
            const nGroups     = state.groups.length;
            const nUnassigned = state.unassigned.length;

            if (nGroups > 0) {
                const avg = (total / nGroups).toFixed(1);
                const uCls = nUnassigned > 0 ? 'text-[#7B1717]' : 'text-black';
                statsText.innerHTML =
                    `<span><strong class="text-black">${total}</strong> participant${total !== 1 ? 's' : ''}</span>` +
                    `<span class="text-gray-300">·</span>` +
                    `<span><strong class="text-black">${nGroups}</strong> group${nGroups !== 1 ? 's' : ''}</span>` +
                    `<span class="text-gray-300">·</span>` +
                    `<span>~<strong class="text-black">${avg}</strong> per group</span>` +
                    `<span class="text-gray-300">·</span>` +
                    `<span><strong class="${uCls}">${nUnassigned}</strong> unassigned</span>`;
                statsBar.classList.remove('hidden');
            } else {
                statsBar.classList.add('hidden');
            }

            if (nGroups > 0) {
                unassignedSection.classList.remove('hidden');
                unassignedChips.innerHTML = '';
                if (nUnassigned === 0) {
                    const hint = document.createElement('p');
                    hint.className = 'text-sm text-gray-300 italic';
                    hint.textContent = 'All participants have been assigned';
                    unassignedChips.appendChild(hint);
                } else {
                    state.unassigned.forEach(name =>
                        unassignedChips.appendChild(makeChip(name, -1)));
                }
            } else {
                unassignedSection.classList.add('hidden');
            }

            groupsGrid.innerHTML = '';
            state.groups.forEach((_, i) => groupsGrid.appendChild(makeGroupCard(i)));
        }

        // ── Present-mode render ────────────────────────────────────────────────
        function presentCols(n) {
            if (n <= 1) return 1;
            if (n <= 3) return n;
            if (n === 4) return 2;
            if (n <= 6) return 3;
            if (n <= 8) return 4;
            if (n <= 9) return 3;
            return 4;
        }

        function renderPresent() {
            const n = state.groups.length;

            if (n === 0) {
                presentGrid.innerHTML = '<p style="color:rgba(255,255,255,0.4); font-size:1.25rem; margin:auto;">No groups assigned yet. Go back to Setup.</p>';
                presentSubtitle.textContent = '';
                return;
            }

            const total = state.participants.length;
            presentSubtitle.textContent = `${total} participant${total !== 1 ? 's' : ''} · ${n} group${n !== 1 ? 's' : ''}`;

            const cols = presentCols(n);
            presentGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            presentGrid.style.gridAutoRows = '1fr';

            // Adaptive name font size based on the largest group
            const maxMembers = Math.max(...state.groups.map(g => g.length), 1);
            const nameFontSize =
                maxMembers <= 4  ? '1.25rem' :
                maxMembers <= 8  ? '1.1rem'  :
                maxMembers <= 14 ? '0.95rem' : '0.8rem';

            presentGrid.innerHTML = '';
            state.groups.forEach((members, i) => {
                presentGrid.appendChild(makePresentCard(i, members, nameFontSize));
            });
        }

        function makePresentCard(idx, members, nameFontSize) {
            const card = document.createElement('div');
            card.style.cssText = 'background:white; border-radius:1rem; overflow:hidden; box-shadow:0 25px 50px rgba(0,0,0,0.5); display:flex; flex-direction:column;';

            // Red header
            const hdr = document.createElement('div');
            hdr.style.cssText = 'background:#7B1717; padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center; flex-shrink:0;';

            const name = document.createElement('h2');
            name.style.cssText = 'color:white; font-size:1.5rem; font-weight:800; margin:0; font-family:inherit; line-height:1.2;';
            name.textContent = state.groupNames[idx];

            const badge = document.createElement('span');
            badge.style.cssText = 'background:rgba(255,255,255,0.2); color:white; font-size:0.8rem; padding:0.2rem 0.65rem; border-radius:9999px; flex-shrink:0;';
            badge.textContent = members.length;

            hdr.appendChild(name);
            hdr.appendChild(badge);
            card.appendChild(hdr);

            // Participant list
            const body = document.createElement('div');
            body.style.cssText = 'padding:0.75rem 1.5rem; flex-grow:1; overflow:auto;';

            if (members.length === 0) {
                const empty = document.createElement('p');
                empty.style.cssText = 'color:#9CA3AF; font-style:italic; padding:0.5rem 0;';
                empty.textContent = 'No participants assigned';
                body.appendChild(empty);
            } else {
                members.forEach((pName, i) => {
                    const row = document.createElement('div');
                    const isLast = i === members.length - 1;
                    row.style.cssText = `padding:0.5rem 0; font-size:${nameFontSize}; color:#111827; font-family:inherit; ${isLast ? '' : 'border-bottom:1px solid #F3F4F6;'}`;
                    row.textContent = pName;
                    body.appendChild(row);
                });
            }

            card.appendChild(body);
            return card;
        }

        // ── Group card (edit mode) ─────────────────────────────────────────────
        function makeGroupCard(idx) {
            const card = document.createElement('div');
            card.className = 'drop-zone bg-white rounded-xl border border-gray-200 shadow-lg p-5 flex flex-col min-h-36 transition-colors duration-150';
            registerDropZone(card, idx);

            const hdr = document.createElement('div');
            hdr.className = 'card-hdr flex items-center gap-2 mb-3 pb-2 border-b border-gray-200';

            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.value = state.groupNames[idx];
            nameInput.className = 'font-bold text-black bg-transparent min-w-0 flex-1 border-b-2 border-transparent hover:border-gray-300 focus:border-[#17177B] focus:outline-none transition-colors duration-150 cursor-pointer focus:cursor-text';

            nameInput.addEventListener('blur', () => {
                const trimmed = nameInput.value.trim();
                const newName = trimmed || randomGroupName(state.groupNames.filter((_, i) => i !== idx));
                nameInput.value = newName;
                if (newName !== state.groupNames[idx]) {
                    state.groupNames[idx] = newName;
                    save();
                }
            });
            nameInput.addEventListener('keydown', e => {
                if (e.key === 'Enter')  { e.preventDefault(); nameInput.blur(); }
                if (e.key === 'Escape') { nameInput.value = state.groupNames[idx]; nameInput.blur(); }
            });
            nameInput.addEventListener('dragstart', e => e.stopPropagation());

            const pencil = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            pencil.setAttribute('class', 'edit-hint shrink-0 w-3.5 h-3.5 text-gray-400');
            pencil.setAttribute('viewBox', '0 0 24 24');
            pencil.setAttribute('fill', 'none');
            pencil.setAttribute('stroke', 'currentColor');
            pencil.setAttribute('stroke-width', '2');
            pencil.setAttribute('aria-hidden', 'true');
            const pPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            pPath.setAttribute('stroke-linecap', 'round');
            pPath.setAttribute('stroke-linejoin', 'round');
            pPath.setAttribute('d', 'M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125');
            pencil.appendChild(pPath);

            const badge = document.createElement('span');
            badge.className = 'text-xs text-gray-500 bg-[#E7E6E6] px-2 py-0.5 rounded-full tabular-nums shrink-0';
            badge.textContent = state.groups[idx].length;

            hdr.appendChild(nameInput);
            hdr.appendChild(pencil);
            hdr.appendChild(badge);
            card.appendChild(hdr);

            const area = document.createElement('div');
            area.className = 'flex flex-wrap gap-2 flex-grow content-start';

            if (state.groups[idx].length === 0) {
                const hint = document.createElement('p');
                hint.className = 'text-sm text-gray-300 italic';
                hint.textContent = 'Drop participants here';
                area.appendChild(hint);
            } else {
                state.groups[idx].forEach(name => area.appendChild(makeChip(name, idx)));
            }

            card.appendChild(area);
            return card;
        }

        // ── Chip ───────────────────────────────────────────────────────────────
        function makeChip(name, fromGroup) {
            const chip = document.createElement('div');
            chip.className = 'chip flex items-center gap-1.5 px-3 py-1.5 bg-[#E7E6E6] border border-gray-300 rounded-full text-sm cursor-grab select-none hover:border-gray-400 hover:bg-gray-100 active:cursor-grabbing transition-colors';
            chip.draggable = true;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '8');
            svg.setAttribute('height', '12');
            svg.setAttribute('viewBox', '0 0 8 12');
            svg.setAttribute('fill', '#9CA3AF');
            svg.setAttribute('aria-hidden', 'true');
            [[1,1],[5,1],[1,5],[5,5],[1,9],[5,9]].forEach(([cx, cy]) => {
                const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                c.setAttribute('cx', cx);
                c.setAttribute('cy', cy);
                c.setAttribute('r', '1.5');
                svg.appendChild(c);
            });
            chip.appendChild(svg);

            const label = document.createElement('span');
            label.textContent = name;
            chip.appendChild(label);

            chip.addEventListener('dragstart', e => {
                drag = { name, from: fromGroup };
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => chip.classList.add('dragging'), 0);
            });
            chip.addEventListener('dragend', () => chip.classList.remove('dragging'));

            return chip;
        }

        // ── Drop zone wiring ───────────────────────────────────────────────────
        function registerDropZone(el, toGroup) {
            el.addEventListener('dragover', e => {
                e.preventDefault();
                el.classList.add('drag-over');
            });
            el.addEventListener('dragleave', e => {
                if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over');
            });
            el.addEventListener('drop', e => {
                e.preventDefault();
                el.classList.remove('drag-over');
                if (!drag || drag.from === toGroup) { drag = null; return; }
                movePerson(drag.name, drag.from, toGroup);
                drag = null;
            });
        }

        registerDropZone(unassignedPool, -1);

        // ── Move ───────────────────────────────────────────────────────────────
        function movePerson(name, from, to) {
            if (from === -1) state.unassigned = state.unassigned.filter(n => n !== name);
            else             state.groups[from] = state.groups[from].filter(n => n !== name);

            if (to === -1) state.unassigned.push(name);
            else           state.groups[to].push(name);

            save();
            render();
        }

        // ── Actions ────────────────────────────────────────────────────────────
        function assignRandomly() {
            const names  = participantInput.value.split('\n').map(n => n.trim()).filter(Boolean);
            const unique = [...new Set(names)];
            const n      = Math.max(1, parseInt(groupCountInput.value) || 3);

            if (unique.length === 0) {
                showToast('Enter at least one participant name.', 'warning');
                return;
            }

            state.participants = unique;
            state.numGroups    = n;
            state.unassigned   = [];
            state.groups       = Array.from({ length: n }, () => []);
            state.groupNames   = generateGroupNames(n);

            const shuffled = [...unique];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            shuffled.forEach((p, i) => state.groups[i % n].push(p));

            save();
            render();
            showToast(`${unique.length} participant${unique.length !== 1 ? 's' : ''} assigned to ${n} group${n !== 1 ? 's' : ''}.`, 'success');
        }

        function resetAssignments() {
            if (state.participants.length === 0) {
                showToast('No participants loaded yet.', 'warning');
                return;
            }
            state.unassigned = [...state.participants];
            state.groups     = Array.from({ length: state.numGroups }, () => []);
            while (state.groupNames.length < state.numGroups) {
                state.groupNames.push(randomGroupName(state.groupNames));
            }
            state.groupNames = state.groupNames.slice(0, state.numGroups);
            save();
            render();
            showToast('All participants moved back to unassigned.', 'info');
        }

        function confirmResetAll() {
            if (!confirm('Reset everything? All participants and groups will be cleared.')) return;
            state = { participants: [], numGroups: 3, groups: [], unassigned: [], groupNames: [] };
            localStorage.removeItem(STORAGE_KEY);
            render();
            showToast('Reset complete.', 'info');
        }

        // ── Boot ───────────────────────────────────────────────────────────────
        load();

        if (PRESENT) {
            editWrap.style.display  = 'none';
            document.body.style.padding = '0';
            presentWrap.style.display = 'flex';
            renderPresent();
            window.addEventListener('storage', e => {
                if (e.key === STORAGE_KEY) { load(); renderPresent(); }
            });
        } else {
            render();
        }
    </script>
</body>
</html>
