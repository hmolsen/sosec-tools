<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-size: 11.5px;
    background: #E7E6E6;
    color: #222;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: #7B1717;
    color: #fff;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  header h1 { font-size: 14px; font-weight: 700; letter-spacing: .3px; white-space: nowrap; }
  #status { font-size: 10.5px; color: rgba(255,255,255,0.65); margin-left: auto; white-space: nowrap; }

  a.back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10.5px;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  a.back-link:hover { color: #fff; }

  .toolbar {
    background: #fff;
    border-bottom: 1px solid #d0d7e2;
    padding: 5px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .toolbar label { font-size: 11px; color: #555; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .toolbar input[type=text] {
    padding: 3px 8px;
    border: 1px solid #bcc6d4;
    border-radius: 4px;
    font-size: 11px;
    width: 220px;
    outline: none;
    background: #E7E6E6;
    font-family: 'Open Sans', sans-serif;
  }
  .toolbar input[type=text]:focus { border-color: #17177B; }
  #count { font-size: 10.5px; color: #888; margin-left: auto; }

  .table-wrap {
    flex: 1;
    overflow: auto;
    min-height: 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  /* col 1 */ colgroup .c-start    { width: 72px; }
  /* col 2 */ colgroup .c-end      { width: 72px; }
  /* col 3 */ colgroup .c-title    { } /* fills remaining */
  /* col 4 */ colgroup .c-short    { width: 115px; }
  /* col 5 */ colgroup .c-trainer  { width: 165px; }
  /* col 6 */ colgroup .c-lang     { width: 30px;  }
  /* col 7 */ colgroup .c-tn       { width: 90px;  }
  /* col 8 */ colgroup .c-location { width: 205px; }
  /* col 9 */ colgroup .c-link     { width: 28px;  }

  thead th {
    background: #7B1717;
    color: #fff;
    padding: 4px 7px;
    text-align: left;
    cursor: pointer;
    position: sticky;
    top: 0;
    z-index: 5;
    font-size: 10.5px;
    font-weight: 600;
    white-space: nowrap;
    user-select: none;
    border-right: 1px solid #631212;
  }
  thead th:last-child { border-right: none; }
  thead th:hover { background: #C05C5C; color: #fff; }
  thead th.th-lang { text-align: center; padding: 4px 2px; }
  thead th.asc  { color: #ffd54f; }
  thead th.desc { color: #ffd54f; }
  thead th.asc::after  { content: ' ↑'; }
  thead th.desc::after { content: ' ↓'; }

  tbody tr {
    border-bottom: 1px solid #e4e9f0;
    transition: background .08s;
  }
  tbody tr:nth-child(even) { background: #f7f9fc; }
  tbody tr:nth-child(odd)  { background: #fff; }
  tbody tr:hover           { background: #F8E6E6 !important; }

  tbody tr.hannes       { background: #fff8e1 !important; border-left: 3px solid #f4a700; }
  tbody tr.hannes:hover { background: #ffeeb3 !important; }
  tbody tr.hannes td:first-child { padding-left: 4px; }

  tbody tr.past             { opacity: .55; }
  tbody tr.past td          { color: #777; }
  tbody tr.past.hannes      { opacity: .7; }

  td {
    padding: 2px 7px;
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    height: 22px;
    line-height: 22px;
    border-right: 1px solid #eaecf0;
  }
  td:last-child { border-right: none; }

  .fi { font-size: 14px; display: block; line-height: 1; }

  .tn-cell  { display: flex; align-items: center; gap: 5px; height: 100%; }
  .tn-text  { width: 38px; flex-shrink: 0; font-size: 10.5px; }
  .bar-bg   { flex: 1; height: 5px; background: #dde3ec; border-radius: 3px; overflow: hidden; }
  .bar-fg   { height: 100%; border-radius: 3px; }
  .bar-low    { background: #4caf50; }
  .bar-medium { background: #ff9800; }
  .bar-full   { background: #e53935; }

  .loc-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 9px;
    font-size: 10px;
    font-weight: 600;
    line-height: 15px;
    vertical-align: middle;
  }
  .loc-online   { background: #e3f2fd; color: #1565c0; }
  .loc-inperson { background: #f3e5f5; color: #6a1b9a; }
  .loc-other    { background: #e8f5e9; color: #2e7d32; }

  .dim { color: #bbb; }

  a.ext-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    margin: auto;
    border-radius: 3px;
    color: #7B1717;
    text-decoration: none;
    font-size: 13px;
    line-height: 1;
    opacity: .7;
    transition: opacity .1s;
  }
  a.ext-link:hover { opacity: 1; background: #F8E6E6; }

  #error-msg {
    display: none;
    padding: 20px;
    text-align: center;
    color: #7B1717;
    font-size: 13px;
  }
</style>
</head>

<header>

  <span id="status">Lade…</span>

  <label><input type="checkbox" id="chkHannes" checked onchange="render()"> Nur Hannes Molsen</label>
  <span id="count"></span>
</div>

<div class="table-wrap">

      <col class="c-start">
      <col class="c-end">
      <col class="c-title">
      <col class="c-short">
      <col class="c-trainer">
      <col class="c-lang">
      <col class="c-tn">
      <col class="c-location">
      <col class="c-link">
    </colgroup>
    <thead>
      <tr>
        <th data-key="start"                            onclick="setSort(this)">Start</th>
        <th data-key="end"                              onclick="setSort(this)">Ende</th>
        <th data-key="title"                            onclick="setSort(this)">Titel</th>
        <th data-key="courseShortCode"                  onclick="setSort(this)">Kürzel</th>
        <th data-key="trainer"                          onclick="setSort(this)">Trainer</th>
        <th class="th-lang" data-key="lang"             onclick="setSort(this)" title="Sprache">🌐</th>
        <th data-key="numberOfParticipants"             onclick="setSort(this)" title="Teilnehmer / Max">TN / Max</th>
        <th data-key="location"                         onclick="setSort(this)">Ort</th>
        <th style="cursor:default;text-align:center" title="Link zur Kursseite">↗</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="9" style="text-align:center;padding:20px;color:#999">Lade Daten…</td></tr>
    </tbody>
  </table>
  <div id="error-msg"></div>
</div>

let data    = [];
let sortKey = 'start';
let sortDir = 1;
const now   = new Date();

const LANG_ISO = { de: 'de', en: 'gb' };
const langBadge = code => {
  const iso = LANG_ISO[code];
  return iso ? `<span class="fi fi-${iso}" title="${code}"></span>` : '<span class="dim">—</span>';
};

function detectLang(shortCode) {
  if (!shortCode) return 'de';
  if (/[-_](?:ENGL\([^)]*\)|ENGL|ENG|EN)$/i.test(shortCode)) return 'en';
  return 'de';
}

/* ── helpers ─────────────────────────────────────── */
const fmtDate = iso => {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });
};

const trainerStr = t =>
  t && t.length ? t.map(x => `${x.firstName} ${x.lastName}`).join(', ') : '';

const isHannes = t =>
  t && t.some(x => x.firstName === 'Hannes' && x.lastName === 'Molsen');

const courseTitle = e => (COURSE_DATA[e.courseShortCode] || {}).title || '';
const courseUrl   = e => {
  const code  = e.courseShortCode;
  if (!code) return '';
  const entry = COURSE_DATA[code];
  return (entry && entry.url) || `https://www.oose.de/suche?q=${encodeURIComponent(code)}`;
};
const courseLang  = e => detectLang(e.courseShortCode);

const sortVal = (e, key) => {
  switch (key) {
    case 'courseShortCode':       return (e.courseShortCode || '').toLowerCase();
    case 'title':                 return courseTitle(e).toLowerCase();
    case 'lang':                  return courseLang(e).toLowerCase();
    case 'start':                 return e.start || '';
    case 'end':                   return e.end   || '';
    case 'trainer':               return trainerStr(e.trainers).toLowerCase();
    case 'numberOfParticipants':  return e.numberOfParticipants ?? -1;
    case 'location':              return (e.location || '').toLowerCase();
    default:                      return '';
  }
};

const locationBadge = e => {
  if (e.isOnline || (e.location || '').toLowerCase() === 'online')
    return `<span class="loc-badge loc-online">Online</span>`;
  if ((e.location || '').toLowerCase().includes('hamburg') || e.address)
    return `<span class="loc-badge loc-inperson" title="${e.location}">${e.location}</span>`;
  return `<span class="loc-badge loc-other" title="${e.location || ''}">${e.location || '—'}</span>`;
};

/* ── render ──────────────────────────────────────── */
function render() {
  const q       = document.getElementById('filter').value.trim().toLowerCase();
  const future  = document.getElementById('chkFuture').checked;
  const hannesF = document.getElementById('chkHannes').checked;

  let rows = data.filter(e => {
    if (future && new Date(e.end) < now) return false;
    if (hannesF && !isHannes(e.trainers)) return false;
    if (!q) return true;
    return (e.courseShortCode || '').toLowerCase().includes(q)
        || courseTitle(e).toLowerCase().includes(q)
        || trainerStr(e.trainers).toLowerCase().includes(q)
        || (e.location || '').toLowerCase().includes(q);
  });

  rows.sort((a, b) => {
    const va = sortVal(a, sortKey), vb = sortVal(b, sortKey);
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });

  document.getElementById('count').textContent =
    `${rows.length} von ${data.length} Terminen`;

  if (!rows.length) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="9" style="text-align:center;padding:14px;color:#999">Keine Treffer</td></tr>';
    return;
  }

  document.getElementById('tbody').innerHTML = rows.map(e => {
    const hannes = isHannes(e.trainers);
    const past   = new Date(e.end) < now;
    const max    = e.maxNumberOfParticipants || 0;
    const cur    = e.numberOfParticipants    || 0;
    const pct    = max ? Math.min(100, (cur / max) * 100) : 0;
    const barCls = pct >= 100 ? 'bar-full' : pct >= 70 ? 'bar-medium' : 'bar-low';
    const rowCls = [hannes ? 'hannes' : '', past ? 'past' : ''].filter(Boolean).join(' ');
    const tname  = trainerStr(e.trainers);
    const title  = courseTitle(e);
    const lang   = courseLang(e);
    const url    = courseUrl(e);

    return `<tr class="${rowCls}">
      <td>${fmtDate(e.start)}</td>
      <td>${fmtDate(e.end)}</td>
      <td title="${title}">${title || '<span class="dim">—</span>'}</td>
      <td title="${e.courseShortCode || ''}">${e.courseShortCode || '<span class="dim">—</span>'}</td>
      <td title="${tname}">${tname || '<span class="dim">—</span>'}</td>
      <td style="text-align:center;padding:2px 2px">${langBadge(lang)}</td>
      <td>
        <div class="tn-cell">
          <span class="tn-text">${cur}/${max || '?'}</span>
          <div class="bar-bg"><div class="bar-fg ${barCls}" style="width:${pct}%"></div></div>
        </div>
      </td>
      <td title="${e.location || ''}">${locationBadge(e)}</td>
      <td style="text-align:center;padding:2px 2px"><a class="ext-link" href="${url}" target="_blank" title="${title || e.courseShortCode || ''}">↗</a></td>
    </tr>`;
  }).join('');
}

/* ── sort ────────────────────────────────────────── */
function setSort(th) {
  const key = th.dataset.key;
  sortDir = (sortKey === key) ? -sortDir : 1;
  sortKey = key;
  document.querySelectorAll('thead th').forEach(h => h.classList.remove('asc', 'desc'));
  th.classList.add(sortDir === 1 ? 'asc' : 'desc');
  render();
}

/* ── load ────────────────────────────────────────── */
async function load() {
  const statusEl = document.getElementById('status');
  try {
    const res = await fetch(API_EVENTS);
    if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
    data = await res.json();
    const t = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    statusEl.textContent = `${data.length} Termine · Stand ${t}`;
    document.querySelector('th[data-key="start"]').classList.add('asc');
    render();
  } catch (err) {
    statusEl.textContent = 'Fehler beim Laden';
    const em = document.getElementById('error-msg');
    em.style.display = 'block';
    em.textContent = `Konnte Daten nicht laden: ${err.message}`;
    document.getElementById('tbody').innerHTML = '';
  }
}

load();
</script>
